version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: geochallenge_postgres
    environment:
      POSTGRES_USER: geochallenge
      POSTGRES_PASSWORD: geochallenge_secret
      POSTGRES_DB: geochallenge_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geochallenge -d geochallenge_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
